services:

# ===================== MYSQL =====================
  db:
    image: mysql:8.0
    container_name: aimusic_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: music
      MYSQL_DATABASE: aimusicgeneration
      MYSQL_USER: music
      MYSQL_PASSWORD: music
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL","mysqladmin ping -h 127.0.0.1 -uroot -pmusic || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - aimusic_network


# ===================== REDIS =====================
  redis:
    image: redis:7-alpine
    container_name: aimusic_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      retries: 5
    networks:
      - aimusic_network


# ===================== OLLAMA =====================
  ollama:
    image: ollama/ollama:latest
    container_name: aimusic_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull llama3.2:latest && wait"
    networks:
      - aimusic_network


# ===================== FASTAPI =====================
  api:
    build: .
    container_name: aimusic_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: mysql+mysqlconnector://music:music@db:3306/aimusicgeneration

      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USERNAME: music
      MYSQL_PASSWORD: music
      MYSQL_DATABASE: aimusicgeneration

      REDIS_HOST: redis
      REDIS_PORT: 6379

      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

      OLLAMA_HOST: http://ollama:11434
      PYTHONUNBUFFERED: 1

    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "
      alembic upgrade head &&
      gunicorn main:app
      -k uvicorn.workers.UvicornWorker
      --workers 2
      --timeout 120
      --bind 0.0.0.0:8000"
    networks:
      - aimusic_network


# ===================== CELERY WORKER =====================
  celery_worker:
    build: .
    container_name: aimusic_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+mysqlconnector://music:music@db:3306/aimusicgeneration

      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USERNAME: music
      MYSQL_PASSWORD: music
      MYSQL_DATABASE: aimusicgeneration

      REDIS_HOST: redis
      REDIS_PORT: 6379

      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

      OLLAMA_HOST: http://ollama:11434
      PYTHONUNBUFFERED: 1

    command: celery -A celery_app worker --loglevel=info --concurrency=1
    networks:
      - aimusic_network


# ===================== CELERY BEAT =====================
  celery_beat:
    build: .
    container_name: aimusic_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+mysqlconnector://music:music@db:3306/aimusicgeneration
      CELERY_BROKER_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    command: celery -A celery_app beat --loglevel=info
    networks:
      - aimusic_network


# ===================== FLOWER =====================
  flower:
    build: .
    container_name: aimusic_flower
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - celery_worker
    environment:
      DATABASE_URL: mysql+mysqlconnector://music:music@db:3306/aimusicgeneration

      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USERNAME: music
      MYSQL_PASSWORD: music
      MYSQL_DATABASE: aimusicgeneration

      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

    command: celery -A celery_app flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - aimusic_network


# ===================== SAFE PERSISTENT VOLUMES =====================
volumes:
  db_data:
    external: true
    name: aimusic_db_data

  redis_data:
    external: true
    name: aimusic_redis_data

  ollama_data:
    external: true
    name: aimusic_ollama_data


networks:
  aimusic_network:
    driver: bridge
